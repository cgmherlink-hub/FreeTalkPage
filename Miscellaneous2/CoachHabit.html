<div class="section">
<h2>D. 教練式評分總覽（非診斷）</h2>

<p>界線感（Boundary）指數：<span class="score" id="boundaryScore">尚未計算</span></p>
<p>自信穩定度（Confidence）指數：<span class="score" id="confidenceScore">尚未計算</span></p>

<div class="result-box" id="coachSummary">
完成勾選後，將自動顯示教練式提醒。
</div>

<script>
function calculateScores() {
  const boundaryItems = ["a2","a3","b4","b5","c1","c5"];
  const confidenceItems = ["a4","a5","b2","b3","c3"];

  function getScore(name) {
    const radios = document.getElementsByName(name);
    for (let i = 0; i < radios.length; i++) {
      if (radios[i].checked) return i + 1;
    }
    return null;
  }

  let bt = 0, bc = 0, ct = 0, cc = 0;

  boundaryItems.forEach(q => {
    const s = getScore(q);
    if (s) { bt += s; bc++; }
  });

  confidenceItems.forEach(q => {
    const s = getScore(q);
    if (s) { ct += s; cc++; }
  });

  if (bc) document.getElementById("boundaryScore").innerText = (bt / bc).toFixed(1);
  if (cc) document.getElementById("confidenceScore").innerText = (ct / cc).toFixed(1);

  let msg = "";
  if (bc && cc) {
    const b = bt / bc, c = ct / cc;
    if (b >= 4 && c >= 4)
      msg = "你在界線與自我肯定上都有一定穩定度，真正需要的不是再撐，而是選擇何時不用撐。";
    else if (b < 3 && c < 3)
      msg = "你可能長期用「多做一點」來換取安全感，這不是不夠好，而是太少被保護。";
    else if (b < 3)
      msg = "你的界線容易被消耗，這不代表你不自信，而是你習慣先顧全他人。";
    else
      msg = "你對自己其實有一定判斷力，但在關係與角色中，仍容易壓縮自己的位置。";
  }

  document.getElementById("coachSummary").innerText = msg;
}

document.querySelectorAll("input[type=radio]").forEach(r => {
  r.addEventListener("change", calculateScores);
});
</script>
