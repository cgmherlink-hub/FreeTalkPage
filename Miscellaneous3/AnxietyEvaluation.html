<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Social Support Assessment Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.container { display: flex; gap: 20px; }
.panel { width: 50%; }
h2 { border-bottom: 2px solid #444; padding-bottom: 5px; }
label { display: block; margin: 6px 0; }
textarea { width: 100%; height: 160px; }
.output { background: #f5f5f5; padding: 10px; white-space: pre-wrap; }
.badge { font-weight: bold; padding: 4px 8px; }
.S0 { color: green; }
.S1 { color: #555; }
.S2 { color: orange; }
.S3 { color: red; }
.flag { color: red; font-weight: bold; }
</style>
</head>

<body>

<h1>🧠 社會支持（Social Support）評估 Dashboard</h1>

<div class="container">

<!-- LEFT -->
<div class="panel">
<h2>一、社會支持評估（勾選）</h2>

<label><input type="checkbox" class="support" value="2"> 有穩定可依賴的家人或伴侶</label>
<label><input type="checkbox" class="support" value="2"> 有朋友／同事可提供情感支持</label>
<label><input type="checkbox" class="support" value="1"> 遇到困難時知道可以向誰求助</label>
<label><input type="checkbox" class="support" value="1"> 願意主動向他人求助</label>
<label><input type="checkbox" class="support" value="1"> 社會互動頻率尚可（非長期孤立）</label>

<label><input type="checkbox" class="risk" value="risk"> 長期缺乏可傾訴或支持的人</label>
<label><input type="checkbox" class="risk" value="risk"> 與家人／重要他人關係緊張或斷裂</label>
<label><input type="checkbox" class="risk" value="risk"> 即使需要幫助也不敢或不願求助</label>

<h2>二、主要支持者</h2>

<label>姓名（可留空）：
<input type="text" id="supportName" style="width:100%;">
</label>

<label>關係（必填）：
<select id="supportRelation" style="width:100%;">
<option value="">— 請選擇 —</option>
<option>配偶 / 伴侶</option>
<option>父母</option>
<option>子女</option>
<option>兄弟姊妹</option>
<option>朋友</option>
<option>同事</option>
<option>其他</option>
</select>
</label>

<button onclick="generate()">產生病歷敘述</button>
</div>

<!-- RIGHT -->
<div class="panel">
<h2>三、評估結果</h2>

<div id="level"></div>
<div id="flag"></div>

<h3>📄 中文病歷敘述</h3>
<div id="cn" class="output"></div>

<h3>📄 English Medical Note</h3>
<div id="en" class="output"></div>
</div>

</div>

<script>
function generate() {
  let score = 0;
  document.querySelectorAll('.support:checked').forEach(cb => {
    score += parseInt(cb.value);
  });

  let risks = document.querySelectorAll('.risk:checked').length;

  let level = "S0";
  if (score <= 1) level = "S3";
  else if (score <= 3) level = "S2";
  else if (score <= 5) level = "S1";

  let levelText = {
    S0: "社會支持充足",
    S1: "社會支持有限但可取得",
    S2: "社會支持不足",
    S3: "缺乏社會支持（紅旗）"
  };

  document.getElementById("level").innerHTML =
    `<span class="badge ${level}">${level}｜${levelText[level]}</span>`;

  document.getElementById("flag").innerHTML =
    risks > 0 || level === "S3"
    ? `<div class="flag">⚠️ 紅旗提示：個案可能缺乏足夠社會支持，需臨床留意其心理風險。</div>`
    : "";

  let name = document.getElementById("supportName").value;
  let relation = document.getElementById("supportRelation").value;
  let supporter = relation ? (name ? `${relation}（${name}）` : relation) : "未明確";

  document.getElementById("cn").innerText =
`社會支持評估顯示目前為 ${level}（${levelText[level]}）。
主要支持來源為：${supporter}。
整體而言，社會支持狀況需持續追蹤與臨床關注。`;

  document.getElementById("en").innerText =
`Social support assessment indicates level ${level}.
Primary support source: ${supporter}.
Overall social support status warrants ongoing clinical attention.`;
}
</script>

</body>
</html>
