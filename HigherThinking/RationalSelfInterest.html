<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>為自己，卻改變了全家</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 20px;
    line-height: 1.8;
    color: #333;
  }
  .card {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  h1 {
    font-size: 22px;
    margin-bottom: 16px;
  }
  .highlight {
    color: #e63946;
    font-weight: bold;
  }
  .btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: #457b9d;
    color: white;
  }
  .btn:hover {
    background: #1d3557;
  }
  .result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 10px;
    background: #f1faee;
    display: none;
  }
</style>
</head>
<body>

<div class="card">
  <h1>【他說他只是為了自己，結果卻救了全家】</h1>

  <p>「醫師，我沒有要當好人，我只是想活久一點。」</p>
  <p>阿偉，血糖 320，菸齡 30 年。</p>

  <p class="highlight">我回答：「那很好。」</p>

  <p>三個月後——</p>
  <p>血糖下降、體力變好。</p>
  <p>但真正改變的，是整個家。</p>

  <hr>

  <p class="highlight">👉 如果是你，你會怎麼開始？</p>

  <button class="btn" onclick="showResult('a')">我想為家人改變</button>
  <button class="btn" onclick="showResult('b')">我只想為自己變好</button>
  <button class="btn" onclick="showResult('c')">我其實還沒準備好</button>

  <div id="result" class="result"></div>
</div>

<script>
function showResult(choice) {
  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";

  if(choice === 'a') {
    resultDiv.innerHTML = `
      💡 你屬於「責任型改變」<br><br>
      這是很強的動力，但容易疲乏。<br>
      👉 試著加一個問題：「這對我有什麼好處？」<br><br>
      當你也為自己而做，改變會更持久。
    `;
  }

  if(choice === 'b') {
    resultDiv.innerHTML = `
      🔥 你抓到關鍵了！<br><br>
      真正穩定的改變，來自「自利」。<br>
      👉 當你變好，身邊的人也會一起變好。<br><br>
      這才是最強的影響力。
    `;
  }

  if(choice === 'c') {
    resultDiv.innerHTML = `
      🌱 沒關係，這很正常。<br><br>
      改變不需要完美開始。<br>
      👉 先問自己一個問題：「哪一件最小的事，對我有幫助？」<br><br>
      小小開始，比完美更重要。
    `;
  }
}
</script>

</body>
</html>
