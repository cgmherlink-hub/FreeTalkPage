
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是第幾層精英？</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f4f8;
    margin: 0;
    padding: 20px;
    color: #333;
    line-height: 1.8;
  }
  .card {
    max-width: 640px;
    margin: auto;
    background: #fff;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }
  h1 {
    font-size: 24px;
    margin-bottom: 16px;
  }
  .question {
    font-weight: bold;
    margin-top: 20px;
  }
  .btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: #3a86ff;
    color: white;
  }
  .btn:hover {
    background: #265df2;
  }
  .result {
    margin-top: 20px;
    padding: 18px;
    border-radius: 12px;
    background: #edf6f9;
    display: none;
  }
  .level {
    font-size: 20px;
    font-weight: bold;
    color: #e63946;
  }
</style>
</head>
<body>

<div class="card">
  <h1>🧠 你是第幾層精英？</h1>
  <p>選一個最接近你的答案👇</p>

  <div class="question">Q1：你通常怎麼面對「知道但沒做到」的事情？</div>
  <button class="btn" onclick="choose('A')">我知道很多，但常常沒做</button>
  <button class="btn" onclick="choose('B')">有些會做，有些拖延</button>
  <button class="btn" onclick="choose('C')">我會挑重要的先做</button>
  <button class="btn" onclick="choose('D')">我幾乎都會做到</button>

  <div id="result" class="result"></div>
</div>

<script>
function choose(ans) {
  const result = document.getElementById("result");
  result.style.display = "block";

  if(ans === 'A') {
    result.innerHTML = `
      <div class="level">📚 第1層：資訊型</div><br>
      你知道很多，但行動很少。<br><br>
      👉 建議：不要再增加知識，先選一件事做到。
    `;
  }

  if(ans === 'B') {
    result.innerHTML = `
      <div class="level">🧠 第2層：理解型</div><br>
      你開始理解，但還在掙扎。<br><br>
      👉 建議：設定「最低行動門檻」，每天一點點。
    `;
  }

  if(ans === 'C') {
    result.innerHTML = `
      <div class="level">⚖️ 第3層：決策型</div><br>
      你會選擇重要的事先做。<br><br>
      👉 建議：持續優化決策，放大影響力。
    `;
  }

  if(ans === 'D') {
    result.innerHTML = `
      <div class="level">🔥 第4層：行動型精英</div><br>
      你已經進入少數人區。<br><br>
      👉 建議：開始影響別人，建立系統。
    `;
  }
}
</script>

</body>
</html>
