<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掌握高級多巴胺 - 提升你的行動力</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #a855f7;
            --bg-dark: #0f172a;
            --text-light: #f8fafc;
            --accent-color: #22d3ee;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--accent-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 16px;
            transition: transform 0.3s ease;
            border-bottom: 4px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            border-bottom: 4px solid var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
        }

        .card h3 {
            color: var(--accent-color);
            margin-top: 0;
        }

        .highlight-box {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            padding: 25px;
            border-left: 5px solid var(--secondary-color);
            border-radius: 12px;
            margin: 30px 0;
        }

        .footer {
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 40px;
        }

        .tag {
            display: inline-block;
            padding: 5px 12px;
            background: var(--primary-color);
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 5px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>高級多巴胺養成計畫</h1>
    <p class="subtitle">拒絕廉價快感，找回掌控生活的長效動力</p>

    <div class="grid">
        <div class="card">
            <h3>🚩 目標設定</h3>
            <p>將大目標拆解為「微小任務」。每達成一個進度，大腦就會釋放多巴胺，讓你持續上癮於「進步」。</p>
        </div>
        <div class="card">
            <h3>🎯 挑戰自我</h3>
            <p>尋找「心流」區間。難度適中的挑戰最能激發大腦的獎勵系統，讓枯燥的工作變得有趣。</p>
        </div>
        <div class="card">
            <h3>🏆 成就獎勵</h3>
            <p>給予自己正向反饋。建立「努力 = 獲益」的生理路徑，而非依賴手機、糖分等廉價刺激。</p>
        </div>
    </div>

    <div class="highlight-box">
        <strong>💡 深度思考：</strong>
        廉價多巴胺像煙火，絢麗但短暫；健康多巴胺像恆星，雖然需要能量點燃，卻能為你提供源源不絕的續航力。
    </div>

    <div style="text-align: center;">
        <span class="tag">#自我成長</span>
        <span class="tag">#心理學</span>
        <span class="tag">#行動力</span>
    </div>

    <div class="footer">
        © 2026 成長指南 - 打造更好的自己
    </div>
</div>

</body>
</html>
