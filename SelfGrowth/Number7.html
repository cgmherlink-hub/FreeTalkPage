<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第七名思維｜人生選擇模擬器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Top Nav Bar ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 1px solid #e0e5ee;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .nav-left { display: flex; gap: 8px; }
  .nav-btn {
    text-decoration: none;
    color: #444;
    font-size: 0.8rem;
    background: #f0f2f5;
    border: 1px solid #dde1ea;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
    font-family: "Noto Sans TC", sans-serif;
  }
  .nav-btn:hover { background: #dde3ef; }

  /* ── Visitor Badge ── */
  .visitor-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #eef3ff;
    border: 1px solid #c5d3f5;
    border-radius: 8px;
    padding: 5px 14px;
    line-height: 1.4;
  }
  .vb-label { font-size: 0.65rem; color: #6677aa; }
  .vb-count { font-size: 1rem; font-weight: 700; color: #007BFF; letter-spacing: 0.04em; }
  .vb-sub   { font-size: 0.62rem; color: #99a8c8; }

  /* ── Page Body ── */
  body {
    font-family: "Noto Sans TC", sans-serif;
    background: #f4f6f9;
    padding: 28px 16px 50px;
    min-height: 100vh;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  h1 { text-align: center; font-size: 1.5rem; color: #1a2340; margin-bottom: 12px; }
  p  { color: #555; font-size: 0.95rem; margin-bottom: 8px; line-height: 1.6; }

  #question h3 {
    font-size: 1.1rem;
    color: #1a2340;
    margin: 20px 0 14px;
    line-height: 1.5;
  }
  #question h2 {
    font-size: 1.2rem;
    color: #1a2340;
    margin: 20px 0 10px;
  }

  .button {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 13px 16px;
    border: none;
    border-radius: 10px;
    background: #007BFF;
    color: white;
    font-size: 0.95rem;
    font-family: "Noto Sans TC", sans-serif;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s, transform 0.1s;
  }
  .button:hover  { background: #0056b3; }
  .button:active { transform: scale(0.98); }
  .reset {
    background: #28a745;
    margin-top: 20px;
    text-align: center;
  }
  .reset:hover { background: #1e7e34; }

  .result {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 10px;
    background: #eef3ff;
    border-left: 4px solid #007BFF;
    color: #2a3a6a;
    font-size: 0.95rem;
    line-height: 1.6;
    display: none;
  }

  @media (max-width: 480px) {
    .nav-btn { font-size: 0.73rem; padding: 5px 9px; }
    h1 { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<!-- ── Sticky Nav Bar ── -->
<div class="topbar">
  <div class="nav-left">
    <a href="../index.html" class="nav-btn">🏠 回到首頁</a>
    <a href="javascript:history.back()" class="nav-btn">⬅️ 上一頁</a>
  </div>
  <div class="visitor-badge">
    <span class="vb-label">👥 今日到訪</span>
    <span class="vb-count" id="today-count">—</span>
    <span class="vb-sub">累計 <span id="total-count">—</span> 人次</span>
  </div>
</div>

<!-- ── Main Content ── -->
<div class="container">
  <h1>🎯 第七名思維人生模擬器</h1>
  <p>你是「阿哲」，一位能力不錯的年輕人，目前在職場中排名前段班。</p>
  <p>現在，你面臨三個關鍵選擇 👇</p>

  <div id="question"></div>
  <div id="options"></div>
  <div id="result" class="result"></div>

  <button class="button reset" onclick="restart()">🔄 重新開始</button>
</div>

<script>
  /* ── Visitor Counter ── */
  (function () {
    var today = new Date().toISOString().slice(0, 10);
    var data = {};
    try { data = JSON.parse(localStorage.getItem('rank7_visits') || '{}'); } catch (e) {}
    if (!sessionStorage.getItem('rank7_visited')) {
      sessionStorage.setItem('rank7_visited', '1');
      data[today] = (data[today] || 0) + 1;
      data['__total__'] = (data['__total__'] || 0) + 1;
      try { localStorage.setItem('rank7_visits', JSON.stringify(data)); } catch (e) {}
    }
    document.getElementById('today-count').textContent = (data[today] || 1).toLocaleString() + ' 人';
    document.getElementById('total-count').textContent = (data['__total__'] || 1).toLocaleString();
  })();

  /* ── Game Logic ── */
  let step = 0;
  let score = 0;

  const story = [
    {
      question: "📊 你目前是部門第一名，公司打算重用你，你會？",
      options: [
        { text: "A. 全力衝刺，維持第一名", score: 0, feedback: "你進入高壓模式，開始害怕失誤…" },
        { text: "B. 保持穩定，開始學其他技能", score: 1, feedback: "你保留空間，開始探索新可能…" }
      ]
    },
    {
      question: "🚀 公司提供升遷機會，但會鎖死你的專業領域，你會？",
      options: [
        { text: "A. 接受升遷，確保地位", score: 0, feedback: "你變得更穩，但也更難轉向…" },
        { text: "B. 延後決定，發展第二專長", score: 1, feedback: "你開始建立第二曲線…" }
      ]
    },
    {
      question: "🌱 你有一個不確定的興趣（例如創業／寫作），但短期沒回報，你會？",
      options: [
        { text: "A. 放棄，專注主業", score: 0, feedback: "你變得更穩定，但成長開始停滯…" },
        { text: "B. 保留時間投入", score: 1, feedback: "你開始累積未來的可能性…" }
      ]
    }
  ];

  function showQuestion() {
    const q = story[step];
    document.getElementById('question').innerHTML = `<h3>${q.question}</h3>`;
    let html = '';
    q.options.forEach((opt, i) => {
      html += `<button class="button" onclick="choose(${i})">${opt.text}</button>`;
    });
    document.getElementById('options').innerHTML = html;
  }

  function choose(index) {
    const choice = story[step].options[index];
    score += choice.score;
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';
    resultEl.innerHTML = choice.feedback;
    step++;
    if (step < story.length) {
      setTimeout(() => {
        showQuestion();
        resultEl.style.display = 'none';
      }, 1300);
    } else {
      showFinal();
    }
  }

  function showFinal() {
    let message = '';
    if (score <= 1) {
      message = '⚠️ 你選擇了「第一名思維」：短期穩定，但長期可能受限。你正在把自己困在單一路徑中。';
    } else if (score === 2) {
      message = '⚖️ 你介於兩者之間：有穩定，也有探索，但還可以更大膽。';
    } else {
      message = '🔥 你展現了「第七名思維」：你懂得保留空間、建立第二曲線，長期成長潛力極高！';
    }
    document.getElementById('question').innerHTML = '<h2>🎉 結果分析</h2>';
    document.getElementById('options').innerHTML = '';
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';
    resultEl.innerHTML = message;
  }

  function restart() {
    step = 0;
    score = 0;
    showQuestion();
    document.getElementById('result').style.display = 'none';
  }

  showQuestion();
</script>

</body>
</html>
