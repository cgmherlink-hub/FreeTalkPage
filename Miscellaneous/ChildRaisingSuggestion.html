<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>媽媽溫暖引導進化系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #fdf6ed;
  --warm-white: #fffbf5;
  --amber: #c8813a;
  --amber-light: #e9a55a;
  --amber-pale: #f5dbb8;
  --sage: #7a9e82;
  --sage-light: #c3d9c7;
  --rose: #c97575;
  --rose-pale: #f0d0d0;
  --text-dark: #3a2e24;
  --text-mid: #6b5744;
  --text-soft: #9c8070;
  --shadow: rgba(100, 70, 40, 0.12);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes bloomIn {
  0%   { opacity: 0; transform: scale(0.88) translateY(16px); }
  60%  { transform: scale(1.02) translateY(-2px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes pulse-ring {
  0%   { transform: scale(1); opacity: 0.6; }
  70%  { transform: scale(1.35); opacity: 0; }
  100% { transform: scale(1.35); opacity: 0; }
}
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33%       { transform: translateY(-8px) rotate(2deg); }
  66%       { transform: translateY(-4px) rotate(-1deg); }
}
@keyframes progressFill {
  from { width: 0%; }
}
@keyframes resultBloom {
  0%   { opacity: 0; transform: scale(0.92) translateY(20px); }
  50%  { transform: scale(1.01); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Serif TC', serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Organic background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%, rgba(200,129,58,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 80%, rgba(122,158,130,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 40%, rgba(201,117,117,0.05) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

/* Floating decorative petals */
.petal {
  position: fixed;
  border-radius: 50% 0 50% 0;
  opacity: 0.18;
  pointer-events: none;
  z-index: 0;
  animation: float linear infinite;
}
.petal:nth-child(1) { width: 70px; height: 50px; background: var(--amber); top: 8%; left: 5%; animation-duration: 7s; }
.petal:nth-child(2) { width: 40px; height: 30px; background: var(--sage); top: 20%; right: 8%; animation-duration: 9s; animation-delay: -3s; }
.petal:nth-child(3) { width: 55px; height: 40px; background: var(--rose); bottom: 25%; left: 3%; animation-duration: 11s; animation-delay: -5s; }
.petal:nth-child(4) { width: 35px; height: 25px; background: var(--amber-light); bottom: 10%; right: 6%; animation-duration: 8s; animation-delay: -2s; }

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 56px 24px 48px;
  animation: fadeUp 0.8s ease both;
}

.hero-icon {
  font-size: 56px;
  margin-bottom: 16px;
  display: block;
  filter: drop-shadow(0 4px 12px rgba(200,129,58,0.3));
}

.hero h1 {
  font-family: 'Lora', serif;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 600;
  color: var(--text-dark);
  line-height: 1.4;
  letter-spacing: 0.02em;
  margin-bottom: 14px;
}

.hero p {
  font-size: 0.97rem;
  color: var(--text-soft);
  max-width: 420px;
  margin: 0 auto;
  line-height: 1.9;
  font-style: italic;
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  position: sticky;
  top: 12px;
  z-index: 20;
  margin-bottom: 32px;
  animation: fadeUp 0.8s 0.2s ease both;
}

.progress-track {
  background: rgba(255,255,255,0.7);
  border: 1px solid rgba(200,129,58,0.2);
  border-radius: 30px;
  height: 10px;
  overflow: hidden;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 12px var(--shadow);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber-light), var(--amber), var(--sage));
  background-size: 200% 100%;
  border-radius: 30px;
  width: 0%;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  animation: shimmer 3s ease infinite;
}

.progress-label {
  text-align: right;
  font-size: 0.78rem;
  color: var(--text-soft);
  margin-top: 6px;
  font-family: 'Lora', serif;
  font-style: italic;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 40px 0 20px;
  animation: fadeUp 0.7s ease both;
}

.section-icon {
  font-size: 1.6rem;
  flex-shrink: 0;
}

.section-header h2 {
  font-family: 'Lora', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text-mid);
  letter-spacing: 0.05em;
}

.section-divider {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--amber-pale), transparent);
}

/* ── QUESTION CARD ── */
.question-card {
  background: var(--warm-white);
  border: 1px solid rgba(200,129,58,0.15);
  border-radius: 20px;
  padding: 28px 28px 22px;
  margin-bottom: 16px;
  box-shadow:
    0 2px 16px var(--shadow),
    0 0 0 0 transparent;
  opacity: 0;
  transform: translateY(20px);
  transition:
    opacity 0.5s ease,
    transform 0.5s ease,
    box-shadow 0.3s ease;
  position: relative;
  overflow: hidden;
}

.question-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.question-card.answered {
  border-color: rgba(122,158,130,0.4);
  background: linear-gradient(135deg, #fafff9, var(--warm-white));
}

/* subtle left stripe */
.question-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--amber-pale), var(--sage-light));
  border-radius: 20px 0 0 20px;
  opacity: 0;
  transition: opacity 0.4s;
}
.question-card.answered::before { opacity: 1; }

.question-num {
  font-family: 'Lora', serif;
  font-size: 0.78rem;
  font-style: italic;
  color: var(--amber);
  margin-bottom: 8px;
  letter-spacing: 0.08em;
}

.question-text {
  font-size: 1.02rem;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 18px;
  line-height: 1.6;
}

/* ── RADIO OPTIONS ── */
.options { display: grid; gap: 10px; }

.option-label {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  border: 1.5px solid rgba(200,129,58,0.12);
  background: rgba(255,255,255,0.5);
  transition:
    background 0.25s,
    border-color 0.25s,
    transform 0.2s;
  font-size: 0.95rem;
  color: var(--text-mid);
  user-select: none;
}

.option-label:hover {
  background: rgba(200,129,58,0.06);
  border-color: var(--amber-pale);
  transform: translateX(3px);
}

.option-label.selected {
  background: linear-gradient(135deg, rgba(200,129,58,0.1), rgba(122,158,130,0.08));
  border-color: var(--amber);
  color: var(--text-dark);
  font-weight: 600;
}

.option-label input[type="radio"] { display: none; }

.option-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid rgba(200,129,58,0.3);
  flex-shrink: 0;
  position: relative;
  transition: border-color 0.25s, background 0.25s;
  display: flex; align-items: center; justify-content: center;
}

.option-label.selected .option-dot {
  border-color: var(--amber);
  background: var(--amber);
}

.option-label.selected .option-dot::after {
  content: '';
  width: 6px; height: 6px;
  background: white;
  border-radius: 50%;
}

/* pulse ring on selection */
.option-label.selected .option-dot::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--amber);
  animation: pulse-ring 0.6s ease-out forwards;
}

.option-letter {
  font-family: 'Lora', serif;
  font-size: 0.8rem;
  color: var(--text-soft);
  flex-shrink: 0;
  width: 18px;
}

/* ── RESULT ── */
#resultBox {
  display: none;
  margin-top: 24px;
  animation: resultBloom 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.result-card {
  border-radius: 24px;
  padding: 40px 36px;
  position: relative;
  overflow: hidden;
}

.result-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8813a' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}

.result-stable  { background: linear-gradient(135deg, #f0f9f2, #e6f4ea); border: 2px solid #b5d9bc; }
.result-growing { background: linear-gradient(135deg, #fffbef, #fff4d6); border: 2px solid var(--amber-pale); }
.result-stress  { background: linear-gradient(135deg, #fff5f5, #fde8e8); border: 2px solid #f0c8c8; }

.result-emoji {
  font-size: 3.5rem;
  display: block;
  margin-bottom: 12px;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
}

.result-title {
  font-family: 'Lora', serif;
  font-size: 1.55rem;
  font-weight: 600;
  margin-bottom: 16px;
  line-height: 1.4;
}

.result-stable  .result-title { color: var(--sage); }
.result-growing .result-title { color: var(--amber); }
.result-stress  .result-title { color: var(--rose); }

.result-score-wrap {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 20px;
  opacity: 0.7;
}

.result-score {
  font-family: 'Lora', serif;
  font-size: 2.8rem;
  font-weight: 600;
  line-height: 1;
}

.result-score-max {
  font-size: 1rem;
  color: var(--text-soft);
}

.result-desc {
  font-size: 0.97rem;
  line-height: 1.95;
  color: var(--text-mid);
  margin-bottom: 24px;
}

.advice-list {
  list-style: none;
  display: grid;
  gap: 10px;
}

.advice-list li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.6);
  border-radius: 12px;
  font-size: 0.94rem;
  color: var(--text-dark);
  backdrop-filter: blur(4px);
  animation: fadeUp 0.5s ease both;
}

.advice-list li:nth-child(1) { animation-delay: 0.15s; }
.advice-list li:nth-child(2) { animation-delay: 0.25s; }
.advice-list li:nth-child(3) { animation-delay: 0.35s; }

.advice-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

.result-closing {
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid rgba(200,129,58,0.2);
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 0.98rem;
  color: var(--text-soft);
  text-align: center;
  line-height: 1.9;
}

/* Restart button */
.restart-btn {
  display: block;
  margin: 24px auto 0;
  padding: 14px 40px;
  background: transparent;
  border: 2px solid var(--amber);
  border-radius: 40px;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.93rem;
  color: var(--amber);
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.3s;
}
.restart-btn:hover {
  background: var(--amber);
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(200,129,58,0.3);
}
</style>
</head>
<body>

<!-- Floating petals -->
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>

<div class="wrapper">

  <!-- HERO -->
  <div class="hero">
    <span class="hero-icon">💛</span>
    <h1>媽媽的溫暖引導<br>進化檢測</h1>
    <p>這不是測驗，是看見妳的努力。<br>每一個選擇都沒有對錯，只有真實。</p>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 9 題</div>
  </div>

  <form id="quizForm">

    <!-- Part 1 -->
    <div class="section-header" style="animation-delay:0.1s">
      <span class="section-icon">🌧</span>
      <h2>目前壓力狀態</h2>
      <div class="section-divider"></div>
    </div>

    <!-- Q1 -->
    <div class="question-card" id="q1">
      <div class="question-num">第 1 題</div>
      <div class="question-text">孩子拖延時，妳通常的反應是⋯⋯</div>
      <div class="options">
        <label class="option-label" data-q="q1" data-v="3"><input type="radio" name="q1" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 提醒後讓他自己承擔後果</label>
        <label class="option-label" data-q="q1" data-v="2"><input type="radio" name="q1" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 忍住情緒，靜靜陪他完成</label>
        <label class="option-label" data-q="q1" data-v="1"><input type="radio" name="q1" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 不斷催促，直到他動起來</label>
        <label class="option-label" data-q="q1" data-v="0"><input type="radio" name="q1" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 覺得很疲累、不知道怎麼辦</label>
      </div>
    </div>

    <!-- Q2 -->
    <div class="question-card" id="q2">
      <div class="question-num">第 2 題</div>
      <div class="question-text">孩子頂嘴時，妳的第一個衝動⋯⋯</div>
      <div class="options">
        <label class="option-label" data-q="q2" data-v="3"><input type="radio" name="q2" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 先聽他說完，再溫和回應</label>
        <label class="option-label" data-q="q2" data-v="2"><input type="radio" name="q2" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 表面冷靜，但內心翻騰</label>
        <label class="option-label" data-q="q2" data-v="1"><input type="radio" name="q2" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 音量自動提高</label>
        <label class="option-label" data-q="q2" data-v="0"><input type="radio" name="q2" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 覺得受傷、很委屈</label>
      </div>
    </div>

    <!-- Q3 -->
    <div class="question-card" id="q3">
      <div class="question-num">第 3 題</div>
      <div class="question-text">孩子考差了，妳的反應是⋯⋯</div>
      <div class="options">
        <label class="option-label" data-q="q3" data-v="3"><input type="radio" name="q3" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 問他這次學到了什麼</label>
        <label class="option-label" data-q="q3" data-v="2"><input type="radio" name="q3" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 給予鼓勵，但心裡其實很焦慮</label>
        <label class="option-label" data-q="q3" data-v="1"><input type="radio" name="q3" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 反覆檢討哪裡出了問題</label>
        <label class="option-label" data-q="q3" data-v="0"><input type="radio" name="q3" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 自己的情緒也跟著低落</label>
      </div>
    </div>

    <!-- Part 2 -->
    <div class="section-header" style="animation-delay:0.15s; margin-top:48px">
      <span class="section-icon">🌷</span>
      <h2>溫暖引導思維</h2>
      <div class="section-divider"></div>
    </div>

    <!-- Q4 -->
    <div class="question-card" id="q4">
      <div class="question-num">第 4 題</div>
      <div class="question-text">孩子情緒爆炸的當下，妳怎麼做？</div>
      <div class="options">
        <label class="option-label" data-q="q4" data-v="3"><input type="radio" name="q4" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 先陪在他旁邊，等情緒穩定</label>
        <label class="option-label" data-q="q4" data-v="2"><input type="radio" name="q4" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 試著講道理，解釋原因</label>
        <label class="option-label" data-q="q4" data-v="1"><input type="radio" name="q4" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 要求他馬上冷靜下來</label>
        <label class="option-label" data-q="q4" data-v="0"><input type="radio" name="q4" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 我自己也快要爆炸了</label>
      </div>
    </div>

    <!-- Q5 -->
    <div class="question-card" id="q5">
      <div class="question-num">第 5 題</div>
      <div class="question-text">在妳心裡，相信孩子是⋯⋯</div>
      <div class="options">
        <label class="option-label" data-q="q5" data-v="3"><input type="radio" name="q5" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 本質善良，只是還在學習</label>
        <label class="option-label" data-q="q5" data-v="2"><input type="radio" name="q5" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 有潛力，但需要雕塑</label>
        <label class="option-label" data-q="q5" data-v="1"><input type="radio" name="q5" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 容易被外界影響，得看緊</label>
        <label class="option-label" data-q="q5" data-v="0"><input type="radio" name="q5" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 常常讓我失望</label>
      </div>
    </div>

    <!-- Q6 -->
    <div class="question-card" id="q6">
      <div class="question-num">第 6 題</div>
      <div class="question-text">孩子犯錯時，妳的第一個行動是⋯⋯</div>
      <div class="options">
        <label class="option-label" data-q="q6" data-v="3"><input type="radio" name="q6" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 引導他思考這樣做的後果</label>
        <label class="option-label" data-q="q6" data-v="2"><input type="radio" name="q6" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 提醒他下次要注意</label>
        <label class="option-label" data-q="q6" data-v="1"><input type="radio" name="q6" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 當場立刻糾正</label>
        <label class="option-label" data-q="q6" data-v="0"><input type="radio" name="q6" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 直接責備</label>
      </div>
    </div>

    <!-- Q7 -->
    <div class="question-card" id="q7">
      <div class="question-num">第 7 題</div>
      <div class="question-text">親子衝突過後，妳通常⋯⋯</div>
      <div class="options">
        <label class="option-label" data-q="q7" data-v="3"><input type="radio" name="q7" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 主動找機會修復關係</label>
        <label class="option-label" data-q="q7" data-v="2"><input type="radio" name="q7" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 等氣消了再說</label>
        <label class="option-label" data-q="q7" data-v="1"><input type="radio" name="q7" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 假裝沒事、繼續日常</label>
        <label class="option-label" data-q="q7" data-v="0"><input type="radio" name="q7" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 沉默冷戰</label>
      </div>
    </div>

    <!-- Q8 -->
    <div class="question-card" id="q8">
      <div class="question-num">第 8 題</div>
      <div class="question-text">妳多久給孩子一個擁抱？</div>
      <div class="options">
        <label class="option-label" data-q="q8" data-v="3"><input type="radio" name="q8" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 幾乎每天</label>
        <label class="option-label" data-q="q8" data-v="2"><input type="radio" name="q8" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 每週幾次</label>
        <label class="option-label" data-q="q8" data-v="1"><input type="radio" name="q8" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 偶爾，看心情</label>
        <label class="option-label" data-q="q8" data-v="0"><input type="radio" name="q8" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 很少，覺得尷尬</label>
      </div>
    </div>

    <!-- Q9 -->
    <div class="question-card" id="q9">
      <div class="question-num">第 9 題</div>
      <div class="question-text">孩子說「我不想」的時候，妳⋯⋯</div>
      <div class="options">
        <label class="option-label" data-q="q9" data-v="3"><input type="radio" name="q9" value="3"><span class="option-dot"></span><span class="option-letter">A</span> 先了解他不想的原因</label>
        <label class="option-label" data-q="q9" data-v="2"><input type="radio" name="q9" value="2"><span class="option-dot"></span><span class="option-letter">B</span> 給他幾個選擇，讓他選</label>
        <label class="option-label" data-q="q9" data-v="1"><input type="radio" name="q9" value="1"><span class="option-dot"></span><span class="option-letter">C</span> 告訴他這是規定，不能不做</label>
        <label class="option-label" data-q="q9" data-v="0"><input type="radio" name="q9" value="0"><span class="option-dot"></span><span class="option-letter">D</span> 覺得被挑戰，情緒上來</label>
      </div>
    </div>

  </form>

  <!-- RESULT -->
  <div id="resultBox"></div>

</div>

<script>
const TOTAL = 9;
let answered = {};

function updateProgress() {
  const count = Object.keys(answered).length;
  const pct = (count / TOTAL) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = count + ' / ' + TOTAL + ' 題';
}

function handleSelect(label) {
  const q = label.dataset.q;
  const v = label.dataset.v;

  // Clear siblings
  document.querySelectorAll(`.option-label[data-q="${q}"]`).forEach(l => l.classList.remove('selected'));
  label.classList.add('selected');
  label.querySelector('input').checked = true;

  // Mark card answered
  const card = document.getElementById(q);
  card.classList.add('answered');

  answered[q] = parseInt(v);
  updateProgress();

  // Auto-advance or show result
  if (Object.keys(answered).length === TOTAL) {
    setTimeout(showResult, 500);
  } else {
    // scroll to next unanswered
    const ids = ['q1','q2','q3','q4','q5','q6','q7','q8','q9'];
    const idx = ids.indexOf(q);
    if (idx < ids.length - 1) {
      setTimeout(() => {
        document.getElementById(ids[idx + 1]).scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 300);
    }
  }
}

function showResult() {
  const total = Object.values(answered).reduce((a, b) => a + b, 0);

  let type, emoji, title, desc, advice;

  if (total >= 20) {
    type  = 'result-stable';
    emoji = '🌷';
    title = '穩定溫暖引導型父母';
    desc  = '妳已經找到了情緒與引導之間的平衡點。孩子能在妳身邊感受到穩定的愛，這是最珍貴的禮物。繼續保持這份溫暖，同時也別忘了照顧自己。';
    advice = [
      ['🌿', '每週一次，和孩子進行10分鐘不評判的對話'],
      ['💬', '試著在日常中多說「我看見你了」'],
      ['🫁', '每天給自己5分鐘的安靜時間，充電再出發'],
    ];
  } else if (total >= 14) {
    type  = 'result-growing';
    emoji = '🌼';
    title = '成長進化型父母';
    desc  = '妳正在努力——這本身就值得肯定。有時候會被情緒帶走，但妳願意反思、願意改變，這份心意孩子感受得到。小步前進，就是蛻變。';
    advice = [
      ['⏸️', '衝突當下，試著在回應前深呼吸、延遲30秒'],
      ['🤗', '每天擁抱孩子至少10秒，不說話，只是陪著'],
      ['👂', '每週安排一次傾聽時間，讓他說、妳只聽'],
    ];
  } else {
    type  = 'result-stress';
    emoji = '🌧';
    title = '高壓調整期父母';
    desc  = '妳現在承受著很多。這份疲憊不是妳的錯，而是妳一個人扛了太多。在能好好陪伴孩子之前，請先讓自己喘口氣——因為妳值得被照顧。';
    advice = [
      ['🫧', '每天早晨深呼吸5分鐘，只屬於自己的時間'],
      ['🤝', '每週找一位信任的人傾訴，不要一個人悶著'],
      ['🌙', '睡眠優先於功課——媽媽的狀態影響整個家'],
    ];
  }

  const li = advice.map((a, i) =>
    `<li style="animation-delay:${0.15 + i * 0.1}s"><span class="advice-icon">${a[0]}</span><span>${a[1]}</span></li>`
  ).join('');

  document.getElementById('resultBox').innerHTML = `
    <div class="result-card ${type}">
      <span class="result-emoji">${emoji}</span>
      <div class="result-score-wrap">
        <span class="result-score">${total}</span>
        <span class="result-score-max">/ 27 分</span>
      </div>
      <div class="result-title">${title}</div>
      <div class="result-desc">${desc}</div>
      <ul class="advice-list">${li}</ul>
      <div class="result-closing">
        溫暖不是放縱，是即使疲憊，<br>仍然選擇穩定地陪在他身旁。<br><br>
        💛 謝謝妳，願意做得更好的媽媽。
      </div>
      <button class="restart-btn" onclick="restart()">再測一次</button>
    </div>
  `;
  document.getElementById('resultBox').style.display = 'block';
  setTimeout(() => {
    document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function restart() {
  answered = {};
  updateProgress();
  document.querySelectorAll('.option-label').forEach(l => {
    l.classList.remove('selected');
    l.querySelector('input').checked = false;
  });
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('answered'));
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('resultBox').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Click handler on labels
document.querySelectorAll('.option-label').forEach(label => {
  label.addEventListener('click', () => handleSelect(label));
});

// Intersection Observer — fade cards in
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.12 });

document.querySelectorAll('.question-card').forEach(c => observer.observe(c));

updateProgress();
</script>
</body>
</html>
